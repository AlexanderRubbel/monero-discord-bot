services:
  monero-wallet-rpc:
    build: ./wallet-rpc
    container_name: monero-wallet-rpc
    restart: unless-stopped
    volumes:
      - ./wallet-data:/wallet
    command: >-
      --wallet-file /wallet/view-only-wallet
      --password-file /wallet/wallet-password.txt
      --daemon-address ${REMOTE_NODE:-node.community.rino.io:18081}
      --trusted-daemon
      --rpc-bind-ip 0.0.0.0
      --rpc-bind-port 18082
      --confirm-external-bind
      --rpc-login ${RPC_USER}:${RPC_PASS}
      --log-level 1
      --non-interactive
    networks:
      - monero-net

  monero-discord-bot:
    build: ./bot
    container_name: monero-discord-bot
    restart: unless-stopped
    depends_on:
      - monero-wallet-rpc
    env_file: .env
    environment:
      RPC_HOST: monero-wallet-rpc
      RPC_PORT: "18082"
      STATE_FILE: /app/data/state.json
    volumes:
      - ./bot-data:/app/data
    networks:
      - monero-net

networks:
  monero-net:
    driver: bridge
